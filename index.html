/* ============================================================
   항적 추적 (Voyage Tracker · unovt 통합)
   - 부킹/MBL/컨테이너 번호로 선박 위치·항로를 지도에 표시
   - 저장 샘플 없음. 선사 실시간 백엔드(LIVE_API)로 조회.
   - 선사 Open API 키를 받으면 LIVE_API가 실제 데이터를 반환합니다.
   ============================================================ */
const VT_DATA = { shipments:{}, aliases:{} };  // 저장 데이터 (현재 비어있음 - 실시간 조회 위주)
// 실시간 항적 추적 Edge Function (메인 Supabase 프로젝트로 통합)
const VT_LIVE_API = FN_BASE ? `${FN_BASE}/kmtc-track` : "";
const VT_EVMETA={IN_GATE:['게이트 인','Gate In'],LOADED:['본선 적재','Loaded'],VSL_DEP:['출항','Departure'],
  VSL_ARR:['입항','Arrival'],TRANSSHIP:['환적','Transship'],DISCHARGE:['양하','Discharged'],
  GATE_OUT:['게이트 아웃','Gate Out'],TRK_DEP:['트럭 출발','Truck Dep'],TRK_ARR:['트럭 도착','Truck Arr']};
const VT_ROLE={origin:['출발','출'],transship:['환적','경'],destination:['도착','도']};

let vtMap=null, vtLayer=null, vtCur=null, vtInited=false;

function vtNorm(s){return (s||'').toUpperCase().replace(/[\s\-]/g,'');}
function vtResolve(raw){
  const ref=vtNorm(raw); if(!ref) return {error:'번호를 입력하세요.'};
  const id=VT_DATA.aliases[ref]; if(!id) return {error:`'${raw}' 저장된 화물에 없습니다. 실시간 조회를 시도합니다.`};
  const s=JSON.parse(JSON.stringify(VT_DATA.shipments[id])); s.queryRef=raw;
  let via='CONTAINER', fb=false;
  if(vtNorm(s.mbl)===ref) via='MBL';
  else if(vtNorm(s.booking)===ref){ via='BOOKING'; if(s.bookingNeedsFallback){ via='BOOKING→MBL'; fb=true; } }
  s.via=via; s.fb=fb; return {s};
}
function vtBearing(a,b){const f1=a[0]*Math.PI/180,f2=b[0]*Math.PI/180,dl=(b[1]-a[1])*Math.PI/180;
  const y=Math.sin(dl)*Math.cos(f2),x=Math.cos(f1)*Math.sin(f2)-Math.sin(f1)*Math.cos(f2)*Math.cos(dl);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;}

function initVoyageTracker(){
  vtInited=false; vtMap=null; vtLayer=null; vtCur=null;
  const mapEl = document.getElementById('vtMap');
  if(!mapEl || typeof L==='undefined') return;
  // 지도 생성
  vtMap=L.map('vtMap',{zoomControl:true,attributionControl:false,worldCopyJump:true}).setView([18,90],3);
  const SOURCES=[
    {url:'https://{s}.basemap.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',opt:{subdomains:'abcd',maxZoom:18}},
    {url:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',opt:{subdomains:'abc',maxZoom:18}}
  ];
  let si=0,tl=null,fails=0;
  function addTiles(){ if(tl)vtMap.removeLayer(tl); const s=SOURCES[si]; tl=L.tileLayer(s.url,s.opt).addTo(vtMap); fails=0;
    tl.on('tileerror',()=>{fails++; if(fails>4&&si<SOURCES.length-1){si++;addTiles();}}); }
  addTiles();
  vtLayer=L.layerGroup().addTo(vtMap);
  vtInited=true;
  setTimeout(()=>vtMap.invalidateSize(),200);
  // 바인딩
  const go=document.getElementById('vtGo'), ref=document.getElementById('vtRef');
  if(go) go.onclick=()=>vtShow(ref.value);
  if(ref) ref.addEventListener('keydown',e=>{if(e.key==='Enter')vtShow(e.target.value);});
  document.querySelectorAll('[data-vtjump]').forEach(c=>c.onclick=()=>{ ref.value=c.dataset.vtjump; vtShow(c.dataset.vtjump); });
  document.getElementById('vtHead').innerHTML='<div class="vt-empty">조회할 번호를 입력하거나<br>위 화물의 부킹번호를 클릭하세요.<br><span style="font-size:11px;color:var(--ink-faint)">(부킹 · MBL · 컨테이너 번호)</span></div>';
}

function vtPinIcon(role){
  const col=role==='transship'?'#F0A741':(role==='destination'?'#E0218A':'#1F6FEB');
  const ltr=VT_ROLE[role]?VT_ROLE[role][1]:'';
  return L.divIcon({className:'',iconSize:[26,34],iconAnchor:[13,34],html:
    `<div style="position:relative"><svg width="26" height="34" viewBox="0 0 26 34"><path d="M13 0C5.8 0 0 5.8 0 13c0 9 13 21 13 21s13-12 13-21C26 5.8 20.2 0 13 0z" fill="${col}"/></svg><span style="position:absolute;top:6px;left:0;width:26px;text-align:center;color:#fff;font:700 11px sans-serif">${ltr}</span></div>`});
}
function vtArrowIcon(brg,col){return L.divIcon({className:'',iconSize:[14,14],iconAnchor:[7,7],
  html:`<svg width="14" height="14" viewBox="0 0 14 14" style="transform:rotate(${brg}deg)"><path d="M7 1 L12 12 L7 9 L2 12 Z" fill="${col}"/></svg>`});}
function vtShipIcon(brg){return L.divIcon({className:'',iconSize:[30,30],iconAnchor:[15,15],
  html:`<svg width="30" height="30" viewBox="0 0 30 30" style="transform:rotate(${brg}deg);filter:drop-shadow(0 1px 3px rgba(0,0,0,.4))"><path d="M15 2 L21 16 L15 22 L9 16 Z" fill="#0B2545" stroke="#fff" stroke-width="1.4" stroke-linejoin="round"/><circle cx="15" cy="13" r="2" fill="#F0A741"/></svg>`});}

function vtDrawSeg(pts,kind){
  if(pts.length<2) return;
  const col=kind==='traveled'?'#3A7CA5':'#A23CE6';
  L.polyline(pts,{color:col,weight:kind==='traveled'?4:3,opacity:.9,dashArray:kind==='traveled'?null:'3 9',lineCap:'round'}).addTo(vtLayer);
  const step=Math.max(2,Math.floor(pts.length/6));
  for(let i=step;i<pts.length-1;i+=step){
    const brg=vtBearing(pts[i-1],pts[i+1]||pts[i]);
    L.marker(pts[i],{icon:vtArrowIcon(brg,'#E0218A'),interactive:false,zIndexOffset:200}).addTo(vtLayer);
  }
}
function vtRender(){
  if(!vtLayer) return;
  vtLayer.clearLayers(); if(!vtCur) return;
  const s=vtCur, ci=s.currentLegIdx, cv=s.currentVertex;
  s.legs.forEach((lg,i)=>{ const p=lg.path;
    if(i<ci) vtDrawSeg(p,'traveled');
    else if(i>ci) vtDrawSeg(p,'remaining');
    else{ vtDrawSeg(p.slice(0,cv+1),'traveled'); vtDrawSeg(p.slice(cv),'remaining'); } });
  s.ports.forEach(pt=>{ L.marker([pt.lat,pt.lng],{icon:vtPinIcon(pt.role),zIndexOffset:500}).addTo(vtLayer)
      .bindTooltip(pt.name.split(',')[0],{permanent:true,direction:'top',offset:[0,-30],className:'plbl'}); });
  const path=s.legs[ci].path, pos=path[cv], ahead=path[Math.min(cv+1,path.length-1)];
  const brg=vtBearing(pos,ahead), vessel=s.legs[ci].vessel+'/'+s.legs[ci].voyage;
  L.marker(pos,{icon:vtShipIcon(brg),zIndexOffset:1000}).addTo(vtLayer)
    .bindTooltip(`${vessel}`,{permanent:true,direction:'right',offset:[12,0],className:'shiplbl'});
  const allp=[]; s.legs.forEach(l=>l.path.forEach(p=>allp.push(p)));
  vtMap.fitBounds(L.latLngBounds(allp).pad(.18));
}
function vtDrawHead(){
  const s=vtCur,o=s.ports[0],d=s.ports[s.ports.length-1];
  document.getElementById('vtHead').innerHTML=`<div class="vt-shead">
    <span class="resolved ${s.fb?'fb':''}"><span class="dot"></span>${s.fb?'부킹→MBL 폴백으로 확정':'조회 완료 · '+({CONTAINER:'컨테이너',MBL:'MBL',BOOKING:'부킹'}[s.via]||s.via)+' 기준'}</span>
    <div><span class="vt-scac">${s.scac||s.carrier}</span><span class="vt-mbl">${s.mbl||''}</span></div>
    <div class="vt-od">
      <div class="pt"><div class="role">출발 Origin</div><div class="nm">${o.name.split(',')[0]}</div></div>
      <div class="conn"></div>
      <div class="pt" style="text-align:right"><div class="role">도착 Destination</div><div class="nm">${d.name.split(',')[0]}</div></div>
    </div>
    <div class="vt-smeta">
      <div class="it"><b>선사</b>${s.carrier}</div>
      <div class="it"><b>컨테이너</b>${(s.containers||[]).length}본</div>
      <div class="it"><b>ETA</b><span class="mono">${s.eta||'-'}</span></div>
      <div class="it"><b>조회번호</b><span class="mono">${s.queryRef}</span></div>
    </div>
    <div class="vt-cnts">${(s.containers||[]).map(c=>`<span class="vt-cnt">${c}</span>`).join('')}</div>
  </div>`;
}
function vtDrawCur(){
  const s=vtCur,lg=s.legs[s.currentLegIdx];
  const arrived=(s.currentLegIdx===s.legs.length-1)&&(s.currentVertex>=lg.path.length-1);
  const status=arrived?'<span style="color:var(--ok)">도착 · 정박</span>':'항해 중';
  document.getElementById('vtCur').innerHTML=`<div class="vt-curbar">
    <span style="font-size:18px">🚢</span>
    <div class="txt"><b>${lg.vessel} ${lg.voyage}</b> ${status}
      <div class="ts">현재 위치 · ${s.positionTs||''}</div></div></div>`;
}
function vtDrawTl(){
  const s=vtCur; let lastDone=-1;
  s.events.forEach((e,i)=>{if(!e.future) lastDone=i;});
  document.getElementById('vtTl').innerHTML=s.events.map((e,i)=>{
    const m=VT_EVMETA[e.type]||[e.type,''];
    const cls=e.future?'future':(i===lastDone?'done last':'done');
    const parts=(e.time||'').split(' '); const date=parts[0]||'', time=parts[1]||'';
    return `<div class="vt-ev ${cls}">
      <div class="t"><span class="d">${date.slice(5)}</span><br>${time} <span style="opacity:.7">${e.tz||''}</span></div>
      <div class="rail"><div class="node"></div></div>
      <div class="body"><div class="ti">${m[0]}<span class="en">${m[1]}</span></div>
        <div class="pl">${e.place}</div>
        ${e.vessel?`<span class="vs">⛴ ${e.vessel}</span>`:''}
      </div></div>`;
  }).join('');
}
async function vtShow(raw){
  if(!vtInited){ initVoyageTracker(); }
  const r=vtResolve(raw);
  if(!r.error){ vtCur=r.s; vtDrawHead(); vtDrawCur(); vtDrawTl(); vtRender(); return; }
  // 저장 데이터에 없으면 → 선사 실시간 백엔드 조회
  if(VT_LIVE_API){
    document.getElementById('vtHead').innerHTML=`<div class="vt-empty">⏳ '${raw}' 실시간 조회 중…</div>`;
    document.getElementById('vtCur').innerHTML=''; document.getElementById('vtTl').innerHTML='';
    try{
      const resp=await fetch(`${VT_LIVE_API}?ref=${encodeURIComponent(vtNorm(raw))}`, {
        headers:{ "Authorization":`Bearer ${SUPABASE_KEY}`, "apikey": SUPABASE_KEY }
      });
      const data=await resp.json();
      if(data && data.legs && !data.error){
        data.via='BOOKING'; data.fb=false; data.queryRef=raw;
        vtCur=data; vtDrawHead(); vtDrawCur(); vtDrawTl(); vtRender(); return;
      }
      vtShowError((data&&data.error)||`'${raw}' 추적 정보를 찾지 못했습니다. (선사 API 키 연동 시 실시간 조회됩니다)`);
    }catch(e){ vtShowError('실시간 조회 실패 — 선사 Open API 키 연동이 필요합니다.'); }
    return;
  }
  vtShowError(r.error);
}
function vtShowError(msg){
  document.getElementById('vtHead').innerHTML=`<div class="vt-empty">${msg}</div>`;
  document.getElementById('vtCur').innerHTML=''; document.getElementById('vtTl').innerHTML='';
  vtLayer&&vtLayer.clearLayers(); vtCur=null;
}

/* ============================================================
   화주 전용 대시보드 (외부 링크 접속)
   - URL: ...?track=<토큰>&c=<화주명>
   - 로그인 없이, 그 화주의 화물만 표시
   - 화물 클릭 → 항적 지도 추적
   ============================================================ */

// 화주명 → 안정적 토큰 생성 (회사명 기반 해시. 추측 어려운 고정값)
function shipperToken(name){
  let h=5381; const salt='seaflow_v1_'+name;
  for(let i=0;i<salt.length;i++){ h=((h<<5)+h+salt.charCodeAt(i))>>>0; }
  // 36진수 + 길이 보강
  let t=h.toString(36);
  let h2=52711; const salt2=name+'_track_key';
  for(let i=0;i<salt2.length;i++){ h2=((h2<<5)+h2+salt2.charCodeAt(i))>>>0; }
  return (t+h2.toString(36)+'k'+(name.length*7)).toLowerCase();
}
// 화주 전용 추적 링크 생성
function shipperPortalLink(name){
  const base = window.location.origin + window.location.pathname;
  return `${base}?track=${shipperToken(name)}&c=${encodeURIComponent(name)}`;
}

let SP_shipper=null, SP_filter='active';

// URL 확인 → 화주 모드인지 판별
function checkShipperPortal(){
  const q = new URLSearchParams(window.location.search);
  const token = q.get('track'), cname = q.get('c');
  if(!token || !cname) return false;
  // 토큰 검증
  if(shipperToken(cname) !== token){
    document.getElementById('shipperPortal').style.display='block';
    document.getElementById('shipperPortal').innerHTML =
      `<div class="sp-wrap" style="padding-top:80px;text-align:center;color:var(--ink-soft)">
         <div style="font-size:40px">🔒</div>
         <h2 style="color:var(--ink)">잘못된 접근입니다</h2>
         <p>링크가 올바르지 않습니다. 담당자에게 정확한 링크를 요청해 주세요.</p>
       </div>`;
    return true;
  }
  // 검증 통과 → 화주 모드 진입
  SP_shipper = cname;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appRoot').style.display='none';
  document.getElementById('shipperPortal').style.display='block';
  // 데이터 로드 후 렌더
  (async()=>{
    if(CLOUD){
      document.getElementById('shipperPortal').innerHTML =
        '<div class="sp-wrap" style="padding-top:80px;text-align:center;color:var(--ink-soft)">☁️ 화물 정보를 불러오는 중...</div>';
      try{ await cloudLoad(); }catch(e){}
    }
    renderShipperPortal();
  })();
  return true;
}

function spMyShipments(){
  return [...DB.shipments, ...DB.imports].filter(s=> s.shipper===SP_shipper || s.consignee===SP_shipper );
}

function renderShipperPortal(){
  const all = spMyShipments();
  const active = all.filter(s=>s.status!=='arrived');
  const done = all.filter(s=>s.status==='arrived');
  let list = all;
  if(SP_filter==='active') list = active;
  else if(SP_filter==='done') list = done;

  const logoSvg = `<svg class="logo" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="20" fill="#fff" opacity=".12"/><path d="M6 24c3 0 3-3 6-3s3 3 6 3 3-3 6-3 3 3 6 3 3-3 4-3" stroke="#5FA8D3" stroke-width="2.4" stroke-linecap="round"/><path d="M6 29c3 0 3-3 6-3s3 3 6 3 3-3 6-3 3 3 6 3 3-3 4-3" stroke="#fff" stroke-width="2.4" stroke-linecap="round" opacity=".7"/></svg>`;

  document.getElementById('shipperPortal').innerHTML = `
    <div class="sp-top">
      <div class="in">
        <div class="sp-brand">${logoSvg}
          <div><div class="nm">SeaFlow 화물 추적</div><div class="co">${SP_shipper}</div></div>
        </div>
        <div class="sp-sum">
          <div class="it"><div class="n">${active.length}</div><div class="l">진행중</div></div>
          <div class="it"><div class="n">${all.filter(s=>s.status==='transit'||s.status==='delay').length}</div><div class="l">운송중</div></div>
          <div class="it"><div class="n">${done.length}</div><div class="l">도착완료</div></div>
        </div>
      </div>
    </div>
    <div class="sp-wrap">
      <div class="sp-filter">
        <button class="${SP_filter==='active'?'on':''}" data-spf="active">진행중 ${active.length}</button>
        <button class="${SP_filter==='all'?'on':''}" data-spf="all">전체 ${all.length}</button>
        <button class="${SP_filter==='done'?'on':''}" data-spf="done">도착완료 ${done.length}</button>
      </div>
      <div id="spList">
        ${list.length ? list.map(s=>spCard(s)).join('') :
          '<div style="text-align:center;padding:50px;color:var(--ink-soft)"><div style="font-size:36px">📦</div><p>해당하는 화물이 없습니다.</p></div>'}
      </div>
      <div class="sp-foot">실시간 위치는 선사 AIS 데이터 기준이며 조회 시점의 스냅샷입니다.<br>powered by <b>SeaFlow</b></div>
    </div>`;

  document.querySelectorAll('[data-spf]').forEach(b=> b.onclick=()=>{ SP_filter=b.dataset.spf; renderShipperPortal(); });
  document.querySelectorAll('[data-spopen]').forEach(c=> c.onclick=()=> spOpenTrack(c.dataset.spopen));
}

function spCard(s){
  const idx = TRACK_STEPS.indexOf(s.status==='delay'?'transit':s.status);
  const flow = TRACK_STEPS.map((step,i)=>`<div class="stp ${i<idx?'done':i===idx?'cur':''}"><div class="dot">${i<idx?'✓':i+1}</div><div class="lb">${STATUS_MAP[step].label}</div></div>`).join('');
  return `<div class="sp-card" data-spopen="${s.booking||s.id}">
    <div class="hd">
      <div class="comm">${s.commodity} <span style="font-size:12px;color:var(--ink-soft);font-weight:400">· ${s.qty}</span></div>
      <span class="badge ${STATUS_MAP[s.status].cls}">${STATUS_MAP[s.status].label}</span>
    </div>
    <div class="route">${s.pol} → ${s.pod} · ${s.carrier}</div>
    ${s.booking?`<div class="bkno">부킹 ${s.booking}${s.bl?` · B/L ${s.bl}`:''}</div>`:''}
    <div class="flow">${flow}</div>
    <div class="eta">입항예정 <b>${s.eta}</b><br><span class="opentrack">🗺️ 클릭하면 지도에서 실시간 위치 보기 →</span></div>
  </div>`;
}

// 화주가 화물 클릭 → 지도 추적 상세
function spOpenTrack(ref){
  document.getElementById('shipperPortal').innerHTML = `
    <div class="sp-top"><div class="in">
      <div class="sp-brand"><div><div class="nm">SeaFlow 화물 추적</div><div class="co">${SP_shipper}</div></div></div>
    </div></div>
    <div class="sp-wrap sp-detail">
      <button class="sp-back" id="spBack">← 내 화물 목록으로</button>
      <div class="vt-stage">
        <div class="vt-panel">
          <div class="vt-body" style="padding:14px;">
            <div id="vtHead"></div><div id="vtCur"></div><div class="vt-tl" id="vtTl"></div>
          </div>
        </div>
        <div class="vt-map" id="vtMap"></div>
      </div>
      <div class="sp-foot">실시간 위치는 선사 AIS 데이터 기준입니다 · powered by <b>SeaFlow</b></div>
    </div>`;
  document.getElementById('spBack').onclick = ()=> renderShipperPortal();
  // 지도 초기화 후 해당 부킹 추적
  vtInited=false; vtMap=null; vtLayer=null; vtCur=null;
  initVoyageTrackerForShipper(ref);
}

// 화주 모드 전용 지도 초기화 (검색창 없이 바로 추적)
function initVoyageTrackerForShipper(ref){
  const mapEl=document.getElementById('vtMap');
  if(!mapEl || typeof L==='undefined') return;
  vtMap=L.map('vtMap',{zoomControl:true,attributionControl:false,worldCopyJump:true}).setView([18,90],3);
  const SOURCES=[
    {url:'https://{s}.basemap.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',opt:{subdomains:'abcd',maxZoom:18}},
    {url:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',opt:{subdomains:'abc',maxZoom:18}}
  ];
  let si=0,tl=null,fails=0;
  function addTiles(){ if(tl)vtMap.removeLayer(tl); const s=SOURCES[si]; tl=L.tileLayer(s.url,s.opt).addTo(vtMap); fails=0;
    tl.on('tileerror',()=>{fails++; if(fails>4&&si<SOURCES.length-1){si++;addTiles();}}); }
  addTiles();
  vtLayer=L.layerGroup().addTo(vtMap);
  vtInited=true;
  setTimeout(()=>vtMap.invalidateSize(),200);
  vtShow(ref);
}

// === 화주 컨펌 화면 (외부 링크) ===
function checkConfirmPortal(){
  const q = new URLSearchParams(window.location.search);
  const token = q.get('confirm'), id = q.get('id');
  if(!token || !id) return false;
  document.getElementById('confirmPortal').style.display='block';
  document.getElementById('loginScreen').style.display='none';
  (async()=>{
    if(CLOUD){
      document.getElementById('confirmPortal').innerHTML =
        '<div class="cp-wrap" style="padding-top:80px;text-align:center;color:var(--ink-soft)">☁️ 발주 내역을 불러오는 중...</div>';
      try{ await cloudLoad(); }catch(e){}
    }
    // 토큰 검증
    if(confirmToken(id)!==token){
      document.getElementById('confirmPortal').innerHTML =
        `<div class="cp-wrap"><div class="cp-card"><div class="cp-done"><div class="ico">🔒</div><h2>잘못된 접근입니다</h2><p>링크가 올바르지 않습니다. 담당자에게 정확한 링크를 요청해 주세요.</p></div></div></div>`;
      return;
    }
    renderConfirmPortal(id);
  })();
  return true;
}
function renderConfirmPortal(id){
  const s = findShipById(id);
  const box = document.getElementById('confirmPortal');
  if(!s){ box.innerHTML = `<div class="cp-wrap"><div class="cp-card"><div class="cp-done"><div class="ico">❓</div><h2>내역을 찾을 수 없습니다</h2><p>담당자에게 문의해 주세요.</p></div></div></div>`; return; }

  // 이미 확정/거절된 경우
  if(s.confirmStatus==='confirmed'){
    box.innerHTML = cpDoneScreen('✅','확인 완료','이미 확정된 발주 내역입니다. 감사합니다.', s); return;
  }
  box.innerHTML = `
    <div class="cp-wrap"><div class="cp-card">
      <div class="cp-top">
        <div class="nm">SeaFlow Forwarding · 발주 컨펌</div>
        <div class="ttl">발주 내역을 확인해 주세요</div>
        <div class="sub">아래는 보내주신 발주서에서 자동 추출한 내역입니다.<br><b>특히 품목과 수량</b>이 정확한지 확인 부탁드립니다.</div>
      </div>
      <div class="cp-body">
        <div class="cf-sheet">
          ${cfRow('화주', s.shipper)}
          ${cfRow('수하인', s.consignee)}
          ${cfRow('품목', s.commodity, true)}
          ${cfRow('수량 / 컨테이너', s.qty, true)}
          ${cfRow('노선', `${s.pol} → ${s.pod}`)}
          ${cfRow('선사', s.carrier)}
          ${cfRow('인코텀즈', s.incoterms)}
          ${cfRow('출항예정', s.etd)}
          ${cfRow('도착예정', s.eta)}
        </div>
        <div class="cp-btns">
          <button class="cp-ok" id="cpOk">✅ 내용이 맞습니다</button>
          <button class="cp-no" id="cpNo">✏️ 수정이 필요합니다</button>
        </div>
        <div class="cp-reject-box" id="cpRejectBox" style="display:none;">
          <textarea id="cpRejectMsg" rows="3" placeholder="어느 부분을 수정해야 하나요? (예: 수량이 2x40HC가 맞습니다)"></textarea>
          <button class="cp-no" style="width:100%;margin-top:8px;color:#fff;background:#C0392B;border:none !important;" id="cpRejectSend">수정요청 보내기</button>
        </div>
      </div>
    </div>
    <div class="sp-foot" style="margin-top:18px;">powered by <b>SeaFlow</b></div>
    </div>`;

  document.getElementById('cpOk').onclick = ()=>{
    s.confirmStatus='confirmed'; s.confirmedAt=new Date().toISOString().slice(0,10);
    cloudUpsertShip(s);
    box.innerHTML = cpDoneScreen('✅','확인해 주셔서 감사합니다','발주 내역이 확정되었습니다. 이 내용으로 선적·통관이 진행됩니다.', s);
  };
  document.getElementById('cpNo').onclick = ()=>{
    document.getElementById('cpRejectBox').style.display='block';
  };
  document.getElementById('cpRejectSend').onclick = ()=>{
    const msg = document.getElementById('cpRejectMsg').value.trim();
    s.confirmStatus='rejected'; s.memo=(s.memo?s.memo+' / ':'')+'[화주 수정요청] '+(msg||'(내용 미기재)');
    cloudUpsertShip(s);
    box.innerHTML = cpDoneScreen('✏️','수정요청이 접수되었습니다','담당자가 확인 후 다시 연락드리겠습니다. 감사합니다.', s);
  };
}
function cpDoneScreen(ico, title, desc, s){
  return `<div class="cp-wrap"><div class="cp-card">
    <div class="cp-done"><div class="ico">${ico}</div><h2>${title}</h2><p>${desc}</p>
    <div style="margin-top:18px;font-size:12px;color:var(--ink-faint)">건 번호 ${s.id} · ${s.commodity} · ${s.qty}</div></div>
  </div><div class="sp-foot" style="margin-top:18px;">powered by <b>SeaFlow</b></div></div>`;
}

// === 외부 진입 체크 (가장 먼저 실행) ===
if(checkConfirmPortal()){
  // 화주 컨펌 모드
} else if(!checkShipperPortal()){
  // 화주 대시보드도 아니면 → 포워더 로그인
  checkGoogleSession();
}
